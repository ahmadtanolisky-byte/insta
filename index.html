<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>InstaViral — Instagram Post Scraper</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#080b14; --surface:#0e1420; --card:#131926;
    --border:rgba(233,69,96,0.18); --accent:#e94560; --accent2:#7b5ea7;
    --pink:#ff6b9d; --blue:#4cc9f0; --green:#56cfe1; --yellow:#ffd166;
    --text:#e8eaf6; --muted:#6b7a99;
    --font:'Syne',sans-serif; --mono:'DM Mono',monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(233,69,96,.04)1px,transparent 1px),linear-gradient(90deg,rgba(233,69,96,.04)1px,transparent 1px);
    background-size:48px 48px;pointer-events:none;z-index:0}
  .orb{position:fixed;border-radius:50%;filter:blur(90px);opacity:.14;pointer-events:none;z-index:0}
  .orb-1{width:600px;height:600px;background:var(--accent);top:-200px;right:-150px;animation:drift 12s ease-in-out infinite alternate}
  .orb-2{width:400px;height:400px;background:var(--accent2);bottom:-100px;left:-100px;animation:drift 16s ease-in-out infinite alternate-reverse}
  @keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(40px,30px) scale(1.08)}}
  .container{max-width:980px;margin:0 auto;padding:0 24px;position:relative;z-index:1}

  /* Header */
  header{padding:44px 0 28px;text-align:center}
  .logo-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(233,69,96,.1);border:1px solid rgba(233,69,96,.3);border-radius:40px;padding:6px 18px 6px 8px;margin-bottom:22px;font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:.05em}
  .logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
  h1{font-size:clamp(2.2rem,5.5vw,3.6rem);font-weight:800;line-height:1.05;letter-spacing:-.02em;margin-bottom:12px}
  h1 span{background:linear-gradient(135deg,var(--accent) 0%,var(--pink) 50%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .subtitle{color:var(--muted);font-size:1rem;font-family:var(--mono);font-weight:300;letter-spacing:.03em}

  /* Session pill */
  .session-pill{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:40px;padding:7px 16px;margin-bottom:28px;font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.04em}
  .s-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .s-dot.green{background:var(--green);box-shadow:0 0 7px var(--green)}
  .s-dot.red{background:var(--accent);box-shadow:0 0 7px var(--accent)}
  .s-dot.grey{background:var(--muted)}

  /* Form card */
  .form-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:34px;margin-bottom:28px;position:relative;overflow:hidden}
  .form-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--pink),var(--accent2),transparent)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
  .form-group{display:flex;flex-direction:column;gap:8px}
  .form-group.full{grid-column:1/-1}
  label{font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
  label .req{color:var(--accent);margin-left:3px}
  input[type=text],input[type=number]{background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:var(--text);font-family:var(--mono);font-size:15px;padding:12px 16px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(233,69,96,.12)}
  input::placeholder{color:var(--muted)}

  /* Sort buttons */
  .sort-options{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .sort-btn{background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;font-family:var(--font);font-size:13px;font-weight:600;padding:14px 8px;transition:all .2s;letter-spacing:.03em}
  .sort-btn .icon{font-size:20px}
  .sort-btn:hover{border-color:rgba(233,69,96,.4);color:var(--text)}
  .sort-btn.active{background:rgba(233,69,96,.12);border-color:var(--accent);color:var(--accent);box-shadow:0 0 16px rgba(233,69,96,.15)}

  /* Submit */
  .btn-scrape{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;cursor:pointer;font-family:var(--font);font-size:16px;font-weight:700;letter-spacing:.05em;padding:16px;transition:opacity .2s,transform .15s;text-transform:uppercase}
  .btn-scrape:hover{opacity:.9;transform:translateY(-1px)}
  .btn-scrape:active{transform:translateY(0)}
  .btn-scrape:disabled{opacity:.5;cursor:not-allowed;transform:none}

  /* Alerts */
  .alert{display:none;border-radius:12px;font-family:var(--mono);font-size:13px;padding:14px 18px;margin-bottom:20px;line-height:1.7}
  .alert.show{display:block}
  .alert-error{background:rgba(233,69,96,.08);border:1px solid rgba(233,69,96,.35);color:var(--accent)}
  .alert-warn{background:rgba(255,209,102,.06);border:1px solid rgba(255,209,102,.25);color:var(--yellow)}
  .alert-success{background:rgba(86,207,225,.07);border:1px solid rgba(86,207,225,.3);color:var(--green)}

  /* Loader */
  .loader{display:none;text-align:center;padding:52px 0}
  .loader.show{display:block}
  .spinner{width:48px;height:48px;border:3px solid rgba(233,69,96,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 20px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .live-counter{margin:0 auto 10px}
  .counter-number{font-size:clamp(3rem,10vw,5.5rem);font-weight:800;line-height:1;background:linear-gradient(135deg,var(--accent),var(--pink),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;transition:all .2s;font-variant-numeric:tabular-nums;letter-spacing:-.03em}
  .counter-label{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-top:2px}
  .counter-phase{font-family:var(--mono);color:var(--accent);font-size:13px;margin-bottom:6px;letter-spacing:.05em;min-height:20px}
  .loader-text{font-family:var(--mono);color:var(--muted);font-size:12px;opacity:.5}

  /* Results */
  .results-section{display:none}
  .results-section.show{display:block}
  .results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .results-title{font-size:1.2rem;font-weight:700}
  .results-title span{color:var(--accent);font-family:var(--mono)}
  .btn-export{background:rgba(86,207,225,.1);border:1px solid rgba(86,207,225,.35);border-radius:10px;color:var(--green);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:.05em;padding:10px 20px;transition:all .2s;text-transform:uppercase}
  .btn-export:hover{background:rgba(86,207,225,.18);transform:translateY(-1px)}

  /* Stats */
  .stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
  .stat-pill{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
  .stat-pill .val{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .stat-pill .lbl{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:3px}

  /* Table */
  .table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--border)}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead tr{background:var(--surface)}
  th{color:var(--muted);font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.1em;padding:14px 16px;text-align:left;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--border)}
  tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:rgba(233,69,96,.04)}
  td{padding:13px 16px;vertical-align:middle}
  .rank-badge{background:rgba(233,69,96,.12);border-radius:6px;color:var(--accent);display:inline-block;font-family:var(--mono);font-size:12px;font-weight:600;min-width:30px;padding:3px 8px;text-align:center}
  .post-link{color:var(--blue);font-family:var(--mono);font-size:12px;text-decoration:none}
  .post-link:hover{color:var(--pink);text-decoration:underline}
  .type-badge{border-radius:6px;font-family:var(--mono);font-size:11px;padding:3px 8px}
  .type-badge.video{background:rgba(123,94,167,.2);color:#b8a0e8;border:1px solid rgba(123,94,167,.3)}
  .type-badge.reel{background:rgba(255,100,130,.18);color:#ff6482;border:1px solid rgba(255,100,130,.35)}
  .type-badge.image{background:rgba(76,201,240,.12);color:var(--blue);border:1px solid rgba(76,201,240,.25)}
  .metric{font-family:var(--mono);font-size:13px;font-weight:500}
  .metric.likes{color:var(--pink)}
  .metric.comments{color:var(--blue)}
  .metric.views{color:#80ffdb}
  .metric.na{color:var(--muted)}
  .caption-cell{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:12px}
  .date-cell{font-family:var(--mono);font-size:12px;color:var(--muted)}

  footer{text-align:center;padding:36px 0 28px;color:var(--muted);font-family:var(--mono);font-size:12px;letter-spacing:.05em}
  footer a{color:var(--accent);text-decoration:none}

  @media(max-width:640px){
    .form-grid{grid-template-columns:1fr}
    .sort-options{grid-template-columns:repeat(2,1fr)}
    .stats-bar{grid-template-columns:1fr}
    .form-card{padding:22px 16px}
    h1{font-size:2rem}
  }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="container">
  <header>
    <h1>Extract <span>Viral Posts</span><br/>from Any IG Account</h1>

    <!-- Session status pill (no login button — session is hardcoded in backend) -->
    <div style="margin-top:18px">
      <div class="session-pill" id="sessionPill">
        <div class="s-dot grey" id="sDot"></div>
        <span id="sText">Checking backend…</span>
      </div>
    </div>
  </header>

  <!-- Form -->
  <div class="form-card">
    <div class="form-grid">
      <div class="form-group full">
        <label>Target Instagram Username <span class="req">*</span></label>
        <input type="text" id="username" placeholder="e.g.  nasa   /   natgeo   /   cristiano" autocomplete="off" spellcheck="false"/>
      </div>
      <div class="form-group">
        <label>Number of Posts <span style="color:var(--muted)">(1–5000, or 0 = all)</span></label>
        <input type="number" id="limit" min="0" max="5000" value="0"/>
      </div>
      <div class="form-group">
        <label>Sort Viral Posts By <span class="req">*</span></label>
        <div class="sort-options">
          <button class="sort-btn active" data-val="likes"    onclick="setSortBy(this)"><span class="icon">❤️</span>Likes</button>
          <button class="sort-btn"        data-val="comments" onclick="setSortBy(this)"><span class="icon">💬</span>Comments</button>
          <button class="sort-btn"        data-val="views"    onclick="setSortBy(this)"><span class="icon">👁️</span>Views</button>
          <button class="sort-btn"        data-val="mixed"    onclick="setSortBy(this)"><span class="icon">⚡</span>Mixed</button>
        </div>
      </div>
    </div>
    <button class="btn-scrape" id="scrapeBtn" onclick="scrape()">🔍 Extract Viral Posts</button>
  </div>

  <div class="alert alert-error"   id="errorBox"></div>
  <div class="alert alert-warn"    id="warnBox"></div>
  <div class="alert alert-success" id="successBox"></div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div class="live-counter" id="liveCounter">
      <div class="counter-number" id="counterNum">0</div>
      <div class="counter-label">posts extracted</div>
    </div>
    <div class="counter-phase" id="counterPhase">Connecting to Instagram…</div>
    <div class="loader-text" id="loaderText"></div>
  </div>

  <!-- Results -->
  <div class="results-section" id="results">
    <div class="results-header">
      <div class="results-title">Top Viral Posts · <span id="resultUsername">@account</span></div>
      <button class="btn-export" onclick="exportExcel()">⬇ Export to Excel</button>
    </div>
    <div class="stats-bar">
      <div class="stat-pill"><div class="val" id="statTotal">0</div><div class="lbl">Posts Found</div></div>
      <div class="stat-pill"><div class="val" id="statLikes">0</div><div class="lbl">Avg Likes</div></div>
      <div class="stat-pill"><div class="val" id="statComments">0</div><div class="lbl">Avg Comments</div></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Post Link</th><th>Type</th>
            <th>❤️ Likes</th><th>💬 Comments</th><th>👁️ Views</th>
            <th>📅 Date</th><th>Caption</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <footer>
  </footer>
</div>

<script>
let sortBy = 'likes';
let cachedPosts = [];
let cachedUsername = '';
let progressTimer = null;
let displayedCount = 0;

// ── Session status ────────────────────────────────────────────────────────────
async function checkStatus() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    const dot  = document.getElementById('sDot');
    const text = document.getElementById('sText');
    if (d.session_ok) {
      dot.className  = 's-dot green';
      text.textContent = `Session active · scraping as @${d.account}`;
      text.style.color = 'var(--green)';
    } else {
      dot.className  = 's-dot red';
      text.textContent = 'No session — run setup_session.py then restart app.py';
      text.style.color = 'var(--accent)';
    }
  } catch {
    const dot = document.getElementById('sDot');
    dot.className = 's-dot red';
    document.getElementById('sText').textContent = 'Backend not reachable — is app.py running?';
    document.getElementById('sText').style.color = 'var(--accent)';
  }
}

// ── Sort ──────────────────────────────────────────────────────────────────────
function setSortBy(btn) {
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  sortBy = btn.dataset.val;
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function fmt(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n.toLocaleString();
}
function hideAlerts() {
  ['errorBox','warnBox','successBox'].forEach(id =>
    document.getElementById(id).classList.remove('show'));
}
function showError(msg) {
  hideAlerts();
  const b = document.getElementById('errorBox');
  b.innerHTML = '⚠ ' + msg;
  b.classList.add('show');
}
function showWarn(msg) {
  hideAlerts();
  const b = document.getElementById('warnBox');
  b.innerHTML = '⚡ ' + msg;
  b.classList.add('show');
}

function animateCount(target) {
  const el = document.getElementById('counterNum');
  const start = displayedCount;
  if (start === target) return;
  const diff = target - start;
  const duration = Math.min(600, Math.max(200, diff * 8));
  const startTime = performance.now();
  function step(now) {
    const t = Math.min(1, (now - startTime) / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    const val = Math.round(start + diff * eased);
    el.textContent = val.toLocaleString();
    if (t < 1) requestAnimationFrame(step);
    else { el.textContent = target.toLocaleString(); displayedCount = target; }
  }
  requestAnimationFrame(step);
}

function startProgressPolling() {
  displayedCount = 0;
  document.getElementById('counterNum').textContent = '0';
  document.getElementById('counterPhase').textContent = 'Connecting to Instagram…';
  progressTimer = setInterval(async () => {
    try {
      const r = await fetch('/api/progress');
      const d = await r.json();
      animateCount(d.count || 0);
      if (d.phase) document.getElementById('counterPhase').textContent = d.phase;
    } catch { /* ignore */ }
  }, 800);
}

function stopProgressPolling() {
  clearInterval(progressTimer);
  progressTimer = null;
}

function setLoading(on) {
  const el  = document.getElementById('loader');
  const btn = document.getElementById('scrapeBtn');
  if (on) {
    el.classList.add('show');
    btn.disabled = true;
    btn.textContent = '⏳ Extracting…';
    startProgressPolling();
  } else {
    el.classList.remove('show');
    btn.disabled = false;
    btn.textContent = '🔍 Extract Viral Posts';
    stopProgressPolling();
  }
}

// ── Scrape ────────────────────────────────────────────────────────────────────
async function scrape() {
  hideAlerts();
  document.getElementById('results').classList.remove('show');

  const username = document.getElementById('username').value.trim().replace(/^@/, '');
  const limitRaw = parseInt(document.getElementById('limit').value);
  const limit    = isNaN(limitRaw) || limitRaw < 1 ? 0 : limitRaw;  // 0 = scrape all

  if (!username) { showError('Please enter an Instagram username.'); return; }
  if (limit < 0 || limit > 5000) { showError('Post count must be between 0 and 5000 (0 = all).'); return; }

  setLoading(true);
  try {
    const r = await fetch('/api/scrape', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, limit, sort_by: sortBy })
    });
    const d = await r.json();
    if (!r.ok) {
      showError(d.error || 'Something went wrong. Check the terminal for details.');
      return;
    }
    if (limit > 0 && d.count < limit) {
      showWarn(`Only ${d.count} posts could be fetched (requested ${limit}). Instagram may have limited the request.`);
    }
    cachedPosts    = d.posts;
    cachedUsername = d.username;
    renderResults(d.posts, d.username);
  } catch {
    showError('Cannot reach backend. Make sure <strong>app.py</strong> is running.');
  } finally {
    setLoading(false);
  }
}

// ── Render table ──────────────────────────────────────────────────────────────
function renderResults(posts, username) {
  document.getElementById('resultUsername').textContent = '@' + username;
  document.getElementById('statTotal').textContent    = posts.length;
  document.getElementById('statLikes').textContent    = fmt(posts.length ? Math.round(posts.reduce((s,p)=>s+p.likes,0)/posts.length) : 0);
  document.getElementById('statComments').textContent = fmt(posts.length ? Math.round(posts.reduce((s,p)=>s+p.comments,0)/posts.length) : 0);

  document.getElementById('tableBody').innerHTML = posts.map((p, i) => `
    <tr>
      <td><span class="rank-badge">${i+1}</span></td>
      <td><a class="post-link" href="${p.url}" target="_blank" rel="noopener">/p/${p.shortcode} ↗</a></td>
      <td><span class="type-badge ${p.type==='Reel' ? 'reel' : p.is_video ? 'video' : 'image'}">${p.type}</span></td>
      <td><span class="metric likes">${fmt(p.likes)}</span></td>
      <td><span class="metric comments">${fmt(p.comments)}</span></td>
      <td><span class="metric views ${p.views ? '' : 'na'}">${p.views ? fmt(p.views) : '—'}</span></td>
      <td><span class="date-cell">${p.date}</span></td>
      <td><div class="caption-cell" title="${(p.caption||'').replace(/"/g,'&quot;')}">${p.caption || '<span style="color:var(--muted)">—</span>'}</div></td>
    </tr>`).join('');

  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Export ────────────────────────────────────────────────────────────────────
async function exportExcel() {
  if (!cachedPosts.length) return;
  try {
    const r    = await fetch('/api/export', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ posts: cachedPosts, username: cachedUsername, sort_by: sortBy })
    });
    const blob = await r.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `instagram_viral_${cachedUsername}.xlsx`; a.click();
    URL.revokeObjectURL(url);
  } catch { showError('Export failed.'); }
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.tagName === 'INPUT') scrape();
});

// Init
checkStatus();
</script>
</body>
</html>
